    <script>
        const supabaseUrl = "https://wlwuntefesaxpzmjzend.supabase.co";
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indsd3VudGVmZXNheHB6bWp6ZW5kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MzE5MDMsImV4cCI6MjA4OTQwNzkwM30.zpfHSJ0Tz8b95mZEiDBHCv5rUPzCAw2bxOal2vunfTU";
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        const adminUser = localStorage.getItem("adminUser");
        if (!adminUser) {
            window.location.href = "login.html";
        }

        async function loadProducts() {
            const { data, error } = await supabase.from("product").select("*").order("ID", { ascending: false });
            const rows = document.getElementById("productRows");
            rows.innerHTML = "";
            if (error) {
                rows.innerHTML = `<tr><td colspan="4" class="text-danger">Error loading products: ${error.message}</td></tr>`;
                return;
            }
            if (!data || data.length === 0) {
                rows.innerHTML = `<tr><td colspan="4" class="text-center">No products found.</td></tr>`;
                return;
            }
            data.forEach((p) => {
                const imageSrc = p.img || "https://via.placeholder.com/64";
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td class="ps-0">
                        <img src="${imageSrc}" alt="" class="thumb-md d-inline rounded-circle me-1">
                        <p class="d-inline-block align-middle mb-0"><span class="font-13 fw-medium">${p.name || "-"}</span></p>
                    </td>
                    <td>$${p.price || "0"}</td>
                    <td>${p.date || "-"}</td>
                    <td class="text-end">
                        <button class="btn btn-link text-danger btn-sm" data-id="${p.ID}" data-action="delete">Delete</button>
                    </td>
                `;
                rows.appendChild(tr);
            });
        }

        async function addProduct(event) {
            event.preventDefault();
            const name = document.getElementById("productName").value.trim();
            const price = document.getElementById("productPrice").value.trim();
            const desc = document.getElementById("productDesc").value.trim();
            if (!name || !price) {
                alert("Name and price are required.");
                return;
            }
            const date = new Date().toLocaleDateString();
            const { error } = await supabase.from("product").insert([{
                name,
                price,
                descrip: desc,
                img: "https://via.placeholder.com/64",
                date
            }]);
            if (error) {
                alert("Add product failed: " + error.message);
                return;
            }
            document.getElementById("productForm").reset();
            await loadProducts();
        }

        document.getElementById("productForm").addEventListener("submit", addProduct);
        document.getElementById("productRows").addEventListener("click", async (e) => {
            if (e.target.dataset.action === "delete") {
                const id = e.target.dataset.id;
                if (!id) return;
                if (!confirm("Delete this product?")) return;
                const { error } = await supabase.from("product").delete().eq("ID", id);
                if (error) {
                    alert("Delete failed: " + error.message);
                } else {
                    await loadProducts();
                }
            }
        });

        loadProducts();
    </script>
