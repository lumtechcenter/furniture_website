        <script src="assets/js/app.js"></script>        <script>
            const supabaseUrl = "https://wlwuntefesaxpzmjzend.supabase.co";
            const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indsd3VudGVmZXNheHB6bWp6ZW5kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MzE5MDMsImV4cCI6MjA4OTQwNzkwM30.zpfHSJ0Tz8b95mZEiDBHCv5rUPzCAw2bxOal2vunfTU";
            const supabase = supabase.createClient(supabaseUrl, supabaseKey);

            const adminUser = localStorage.getItem("adminUser");
            if (!adminUser) {
                window.location.href = "login.html";
            }

            document.getElementById('profileForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const current = document.querySelector('input[name="curpass"]').value;
                const pass = document.querySelector('input[name="pass"]').value;
                const conpass = document.querySelector('input[name="conpass"]').value;
                if (!current || !pass || !conpass) {
                    alert('Please fill all fields.');
                    return;
                }
                if (pass !== conpass) {
                    alert('New password and confirm password do not match.');
                    return;
                }

                const { data, error } = await supabase.from('admin').select('pass').eq('user', adminUser).single();
                if (error || !data) {
                    alert('Could not find user.');
                    return;
                }
                const currentHash = data.pass;
                if (!bcrypt.compareSync(current, currentHash)) {
                    alert('Current password incorrect.');
                    return;
                }
                const newHash = bcrypt.hashSync(pass, 10);
                const { error: updateError } = await supabase.from('admin').update({ pass: newHash }).eq('user', adminUser);
                if (updateError) {
                    alert('Update failed: ' + updateError.message);
                    return;
                }
                localStorage.removeItem('adminUser');
                alert('Password updated. Please log in again.');
                window.location.href = 'login.html';
            });
        </script>    </body>
