<!DOCTYPE html>
<html lang="en" dir="ltr" data-startbar="dark" data-bs-theme="light">
<head>
    <meta charset="utf-8" />
    <title>Login | Approx - Admin & Dashboard Template</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="shortcut icon" href="assets/images/favicon.ico">
    <link href="assets/css/bootstrap.min.css" rel="stylesheet" type="text/css" />
    <link href="assets/css/icons.min.css" rel="stylesheet" type="text/css" />
    <link href="assets/css/app.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
<div class="container-xxl">
  <div class="row vh-100 d-flex justify-content-center">
    <div class="col-12 align-self-center">
      <div class="card-body">
        <div class="row">
          <div class="col-lg-4 mx-auto">
            <div class="card">
              <div class="card-body p-0 bg-black auth-header-box rounded-top">
                <div class="text-center p-3">
                  <a href="index.html" class="logo logo-admin">
                    <img src="assets/images/logo-sm.png" height="50" alt="logo" class="auth-logo">
                  </a>
                  <h4 class="mt-3 mb-1 fw-semibold text-white fs-18">Welcome Back</h4>
                  <p class="text-muted fw-medium mb-0">Sign in to continue to Approx Admin</p>
                </div>
              </div>
              <div class="card-body pt-0">
                <form class="my-4" id="loginForm">
                  <div id="loginMessage" style="color:gray; text-align:center; margin-bottom:16px; min-height:24px;">
                    <b>Login to Admin Panel</b>
                  </div>
                  <div class="form-group mb-3">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" class="form-control" id="username" placeholder="Enter username" required autocomplete="username">
                  </div>
                  <div class="form-group mb-3">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" class="form-control" id="password" placeholder="Enter password" required autocomplete="current-password">
                  </div>
                  <div class="d-grid mt-4">
                    <button class="btn btn-primary" type="submit" id="loginBtn">Log In</button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://wlwuntefesaxpzmjzend.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indsd3VudGVmZXNheHB6bWp6ZW5kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MzE5MDMsImV4cCI6MjA4OTQwNzkwM30.zpfHSJ0Tz8b95mZEiDBHCv5rUPzCAw2bxOal2vunfTU";

// ✅ FIX 1: Correct Supabase v2 initialization
const { createClient } = supabase;
const sbClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const form     = document.getElementById("loginForm");
const message  = document.getElementById("loginMessage");
const loginBtn = document.getElementById("loginBtn");

// JWT Token Generation
function generateJWT(user) {
    const header = btoa(JSON.stringify({ alg: 'HS256', typ: 'JWT' }));
    const payload = btoa(JSON.stringify({
        user: user,
        role: 'admin',
        iat: Math.floor(Date.now() / 1000),
        exp: Math.floor(Date.now() / 1000) + (24 * 60 * 60) // 24 hours expiry
    }));
    const signature = btoa('slz_secret_' + user + Date.now());
    return `${header}.${payload}.${signature}`;
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;

  if (!username || !password) {
    showMessage("Enter both username and password", "orange");
    return;
  }

  showMessage("Checking credentials...", "gray");
  loginBtn.disabled = true;
  loginBtn.textContent = "Verifying...";

  try {

    // ✅ FIX 2: Use limit instead of maybeSingle (more reliable)
    const { data, error } = await sbClient
      .from("admin")
      .select("*")
      .eq("user", username)
      .limit(1);

    if (error) throw error;

    if (!data || data.length === 0) {
      showMessage("Username not found", "red");
      return;
    }

    const userData = data[0];

    // Simple password comparison (plain text stored in DB)
    if (password !== userData.pass) {
      showMessage("Password is incorrect", "red");
      return;
    }

    // ✅ SUCCESS - Save credentials and redirect
    localStorage.setItem("adminUser", username);
    sessionStorage.setItem("adminUser", username);
    console.log("Login success, adminUser saved:", username);

    showMessage("Success! Redirecting...", "limegreen");

    // Redirect
    window.location.href = "products.html";
    return;

  } catch (err) {
    console.error(err);
    showMessage("Login failed. Check console.", "red");
    loginBtn.disabled = false;
    loginBtn.textContent = "Log In";
  }
});

function showMessage(text, color) {
  message.style.color = color;
  message.textContent = text;
}

</script>
</body>
</html>
